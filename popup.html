<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Page Assistant</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>

    <!-- SETTINGS SECTION -->
    <div class="section" id="settingsSection">
      <div class="settings-box">
        <label class="settings-label">🔑 Claude API Key</label>
        <input 
          type="password" 
          id="apiKeyInput" 
          placeholder="Paste your API key here..."
        />
        <button id="saveKeyBtn">💾 Save Key</button>
        <p id="keyStatus" class="key-status"></p>
      </div>
    </div>

    <!-- TOP BAR -->
    <div class="header">
      <h1>🤖 AI Assistant</h1>
      <p class="subtitle">Chat with any webpage</p>
    </div>

    <!-- SUMMARIZE BUTTON -->
    <div class="section">
      <button id="summarizeBtn">⚡ Summarize This Page</button>
    </div>

    <!-- CHAT BOX -->
    <div class="section">
      <textarea
        id="userInput"
        placeholder="Ask anything about this page..."
        rows="3"
      ></textarea>
      <button id="askBtn">💬 Ask</button>
    </div>

    <!-- RESPONSE AREA -->
    <div class="section">
      <div id="responseBox">
        <p class="placeholder-text">Your answer will appear here...</p>
      </div>
    </div>

    <!-- Link to the JavaScript file -->
    <script src="popup.js"></script>

  </body>
</html>
